<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeRPG — Evolua sua Vida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Tailwind CDN with custom config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'bgdark': '#0f172a',
              'rpanel': '#1e293b',
              'neon': '#38bdf8',
              'rglow': '#0ea5e9',
              'tmain': '#e2e8f0',
              'tmuted': '#94a3b8',
              'rgold': '#f59e0b',
            },
            fontFamily: {
              'display': ['"Orbitron"', 'monospace'],
              'body': ['"Rajdhani"', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background-color: #0f172a; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; min-height: 100vh; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0f172a; }
      ::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.3); border-radius: 3px; }

      /* Panels */
      .rpanel { background: #1e293b; border: 1px solid rgba(56,189,248,0.2); border-radius: 12px; padding: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
      .rpanel-glow { background: #1e293b; border: 1px solid rgba(56,189,248,0.35); border-radius: 12px; padding: 16px; box-shadow: 0 0 20px rgba(56,189,248,0.12), 0 4px 24px rgba(0,0,0,0.5); }

      /* Buttons */
      .rbtn { background: rgba(56,189,248,0.1); border: 1px solid #38bdf8; color: #38bdf8; font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 8px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.2s; }
      .rbtn:hover { background: rgba(56,189,248,0.22); box-shadow: 0 0 12px #38bdf8; }
      .rbtn:active { transform: scale(0.95); }
      .rbtn:disabled { opacity: 0.4; cursor: not-allowed; }

      .rbtn-gold { background: rgba(245,158,11,0.1); border: 1px solid #f59e0b; color: #f59e0b; font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 8px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.2s; }
      .rbtn-gold:hover { background: rgba(245,158,11,0.22); box-shadow: 0 0 12px #f59e0b; }
      .rbtn-gold:active { transform: scale(0.95); }
      .rbtn-gold:disabled { opacity: 0.4; cursor: not-allowed; }

      .rbtn-danger { background: rgba(127,29,29,0.2); border: 1px solid rgba(239,68,68,0.5); color: #f87171; font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
      .rbtn-danger:hover { background: rgba(127,29,29,0.4); }

      .rbtn-ghost { color: #94a3b8; cursor: pointer; padding: 6px 12px; border-radius: 8px; background: transparent; border: none; transition: all 0.2s; font-family: 'Rajdhani', sans-serif; font-size: 14px; }
      .rbtn-ghost:hover { color: #38bdf8; background: rgba(56,189,248,0.1); }

      /* Input */
      .rinput { width: 100%; background: #0f172a; border: 1px solid rgba(56,189,248,0.3); border-radius: 8px; padding: 8px 12px; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; font-size: 15px; outline: none; transition: all 0.2s; }
      .rinput::placeholder { color: rgba(148,163,184,0.5); }
      .rinput:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.4); }

      /* XP Bar */
      .xp-track { width: 100%; background: #0f172a; border-radius: 999px; height: 12px; overflow: hidden; border: 1px solid rgba(56,189,248,0.2); }
      .xp-fill { height: 100%; background: linear-gradient(90deg, #0ea5e9, #38bdf8); border-radius: 999px; transition: width 0.7s ease; box-shadow: 0 0 10px #38bdf8; }

      /* Nav */
      .rnav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 12px; border-radius: 12px; cursor: pointer; color: #94a3b8; background: transparent; border: none; transition: all 0.2s; }
      .rnav-item:hover { color: #38bdf8; background: rgba(56,189,248,0.1); }
      .rnav-item.active { color: #38bdf8; background: rgba(56,189,248,0.15); filter: drop-shadow(0 0 6px #38bdf8); }

      /* Text effects */
      .tglow { text-shadow: 0 0 10px #38bdf8, 0 0 20px rgba(56,189,248,0.4); }
      .tglow-gold { text-shadow: 0 0 10px #f59e0b, 0 0 20px rgba(245,158,11,0.4); }

      /* Card hover */
      .rcard:hover { border-color: rgba(56,189,248,0.5) !important; box-shadow: 0 0 12px rgba(56,189,248,0.3); }

      /* Animations */
      @keyframes slideInRight { from { transform: translateX(80px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes floatAnim { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
      @keyframes swordSwing { 0%,100% { transform: rotate(-15deg); } 50% { transform: rotate(15deg); } }
      @keyframes bicepFlex { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
      @keyframes glowPulse { 0%,100% { box-shadow: 0 0 10px #38bdf8; } 50% { box-shadow: 0 0 25px #38bdf8, 0 0 50px rgba(56,189,248,0.4); } }
      @keyframes particle { 0% { transform: translateY(100vh); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(-20px); opacity: 0; } }

      .fade-in { animation: fadeInUp 0.35s ease-out; }
      .float { animation: floatAnim 3s ease-in-out infinite; }
      .sword-swing { animation: swordSwing 1.5s ease-in-out infinite; display: inline-block; transform-origin: bottom center; }
      .bicep-flex { animation: bicepFlex 1s ease-in-out infinite; display: inline-block; }
      .glow-pulse { animation: glowPulse 2s ease-in-out infinite; }
      .notif-in { animation: slideInRight 0.3s ease-out; }

      .particle { position: absolute; width: 2px; height: 2px; background: #38bdf8; border-radius: 50%; animation: particle linear infinite; opacity: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
